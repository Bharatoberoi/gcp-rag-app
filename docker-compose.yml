# Local stack: Qdrant + optional cross-encoder reranker (same contract as reference repo).
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"

  reranker:
    image: mabentley/reranker:latest
    ports:
      - "8000:8000"
    profiles:
      - rerank

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      GCP_PROJECT: ${GCP_PROJECT}
      GCP_LOCATION: ${GCP_LOCATION:-us-central1}
      QDRANT_URL: http://qdrant:6333
      RERANKER_URL: ${RERANKER_URL:-}
      RERANKER_ENABLED: ${RERANKER_ENABLED:-false}
      BM25_STATE_PATH: /data/bm25_df.json
    volumes:
      - rag_data:/data
    depends_on:
      - qdrant

volumes:
  rag_data:
