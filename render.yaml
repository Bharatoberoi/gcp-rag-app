services:
  - type: web
    name: gcp-rag-app
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: documents_hybrid
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_MODEL
        value: llama-3.1-8b-instant
      - key: EMBEDDING_DIMENSIONS
        value: "384"
      - key: DENSE_VECTOR_WEIGHT
        value: "0.7"
      - key: MAX_CHUNK_TOKENS
        value: "400"
      - key: CHUNK_OVERLAP_TOKENS
        value: "50"
      - key: ADJACENT_CHUNK_COUNT
        value: "1"
      - key: RETRIEVAL_MULTIPLIER
        value: "2"
      - key: RERANKER_ENABLED
        value: "false"
      - key: BM25_STATE_PATH
        value: /tmp/bm25_df.json
      - key: MAX_UPLOAD_BYTES
        value: "10485760"
      - key: PRODUCTION_MODE
        value: "true"
      - key: DOCS_ENABLED
        value: "false"
      - key: API_KEYS
        sync: false
